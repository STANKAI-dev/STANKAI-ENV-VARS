<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STANKAI Platinum</title>
  <meta name="description" content="STANKAI Platinum — where intelligence meets precision.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,300&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

    :root {
      --bg: #0e0e11;
      --surface: #16161a;
      --border: #2a2a30;
      --text: #e8e6e1;
      --text-muted: #8a8a8f;
      --accent: #c4a265;
      --accent-dim: rgba(196, 162, 101, 0.12);
    }

    html { scroll-behavior: smooth }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    /* -- Subtle grain overlay -- */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px;
      pointer-events: none;
      z-index: 100;
    }

    /* -- Ambient glow -- */
    .glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-dim) 0%, transparent 70%);
      top: -180px;
      right: -120px;
      pointer-events: none;
      animation: drift 12s ease-in-out infinite alternate;
    }

    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); opacity: 0.6 }
      100% { transform: translate(-60px, 40px) scale(1.15); opacity: 0.8 }
    }

    /* -- Main card -- */
    .card {
      position: relative;
      width: min(92vw, 520px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 56px 44px 48px;
      text-align: center;
      animation: rise 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(32px) }
      to   { opacity: 1; transform: translateY(0) }
    }

    .card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 21px;
      background: linear-gradient(160deg, var(--accent) 0%, transparent 40%, transparent 60%, rgba(196,162,101,0.2) 100%);
      z-index: -1;
      opacity: 0.35;
    }

    /* -- Logo mark -- */
    .logo-mark {
      width: 56px;
      height: 56px;
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--accent);
      border-radius: 14px;
      position: relative;
      animation: rise 0.8s 0.15s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .logo-mark svg {
      width: 26px;
      height: 26px;
      fill: none;
      stroke: var(--accent);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* -- Typography -- */
    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: clamp(1.75rem, 5vw, 2.4rem);
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 6px;
      animation: rise 0.8s 0.25s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    h1 span {
      color: var(--accent);
    }

    .tagline {
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      margin-bottom: 36px;
      animation: rise 0.8s 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    /* -- Divider -- */
    .divider {
      width: 48px;
      height: 1px;
      background: var(--accent);
      opacity: 0.4;
      margin: 0 auto 32px;
      animation: rise 0.8s 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    /* -- Link -- */
    .github-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: transparent;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      animation: rise 0.8s 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .github-link svg {
      width: 20px;
      height: 20px;
      fill: var(--text);
      transition: fill 0.3s ease;
    }

    .github-link:hover {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(196, 162, 101, 0.1);
    }

    .github-link:hover svg {
      fill: var(--accent);
    }

    .github-link:active {
      transform: translateY(0);
    }

    /* -- Footer -- */
    .footer {
      margin-top: 48px;
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0;
      animation: rise 0.8s 0.65s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    /* -- Responsive -- */
    @media (max-width: 480px) {
      .card {
        padding: 40px 28px 36px;
        border-radius: 16px;
      }
      .github-link {
        padding: 12px 24px;
        font-size: 0.9rem;
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <div class="glow"></div>

  <main class="card">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
    </div>

    <h1>STANKAI <span>Platinum</span></h1>
    <p class="tagline">Intelligence meets precision</p>

    <div class="divider"></div>

    <a href="https://github.com/STANKAI-DEV" class="github-link" target="_blank" rel="noopener noreferrer">
      <svg viewBox="0 0 16 16" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
      View on GitHub
    </a>
  </main>

  <p class="footer">STANKAI &middot; 2026</p>

</body>
</html>
